
services:
  # ============================================================================
  # Matching Service — Python FastAPI (private network, self-contained)
  # Uses sqlite-vec for vector search — no external vector DB needed
  # ============================================================================
  matching:
    build: ./matching
    ports:
      - "8001:8001"
    environment:
      MATCHING_SECRET: ${MATCHING_SECRET:-dev-secret-change-me}
      VFACE_ENCRYPTION_KEY: ${VFACE_ENCRYPTION_KEY}
      VECTOR_DB_PATH: /app/data/vectors.db
      COLLECTION_NAME: vface_embeddings
      VECTOR_DIM: "128"
      SIMILARITY_THRESHOLD: "0.85"
    volumes:
      - matching_data:/app/data
    restart: unless-stopped
    networks:
      - vface-internal

  # ============================================================================
  # API Service — Node.js Express (public)
  # ============================================================================
  api:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MATCHING_SERVICE_URL: http://matching:8001
      MATCHING_SECRET: ${MATCHING_SECRET:-dev-secret-change-me}
      VFACE_ENCRYPTION_KEY: ${VFACE_ENCRYPTION_KEY}
      DATABASE_PATH: /app/data/registry.db
      SIGNING_KEY_PATH: /app/data/signing.pem
    volumes:
      - api_data:/app/data
    depends_on:
      - matching
    restart: unless-stopped
    networks:
      - vface-internal
      - default

volumes:
  matching_data:
  api_data:

networks:
  vface-internal:
    driver: bridge
    internal: true  # Matching service is private — not publicly accessible
