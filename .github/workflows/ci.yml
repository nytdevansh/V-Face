name: V-Face CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================================
  # Smart Contract Tests (Hardhat + Solidity)
  # ============================================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx hardhat compile
      - run: npx hardhat test

  # ============================================================================
  # SDK Tests (Mocha)
  # ============================================================================
  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  # ============================================================================
  # Server Lint + Smoke Test
  # ============================================================================
  server-check:
    name: Server Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Verify server boots
        run: |
          timeout 10 node -e "
            require('./signing_keys');
            require('./encryption');
            require('./hashchain');
            console.log('✅ All server modules load successfully');
          " || true

  # ============================================================================
  # Matching Service Lint (Python)
  # ============================================================================
  matching-check:
    name: Matching Service Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: matching
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Verify imports
        run: python -c "from main import app; from qdrant_store import get_client; from crypto_utils import decrypt_embedding; print('✅ All matching modules import successfully')"

  # ============================================================================
  # Dashboard Build (Vite + React)
  # ============================================================================
  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

  # ============================================================================
  # Playground Build (Vite + React)
  # ============================================================================
  playground-build:
    name: Playground Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playground
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
